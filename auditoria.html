<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria · R2 Audit</title>
<link rel="stylesheet" href="styles/theme.css?v=0.31">
<link rel="stylesheet" href="shared.css?v=0.31">
<style>
  .aud-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .aud-head h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .aud-head p { font-size: 13px; color: var(--ink-3); }

  .aud-filters { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
  .aud-filters .field { display: flex; flex-direction: column; gap: 4px; }
  .aud-filters label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    color: var(--ink-4);
  }
  .aud-filters input,
  .aud-filters select {
    padding: 7px 10px;
    background: var(--surface);
    color: var(--ink-1);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 12.5px;
    font-family: inherit;
  }
  .aud-filters input:focus,
  .aud-filters select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(26,58,82,.12); }
  @media (max-width: 900px) {
    .aud-filters { grid-template-columns: 1fr 1fr; }
    .aud-filters .actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; }
  }
  @media (max-width: 480px) { .aud-filters { grid-template-columns: 1fr; } }

  .aud-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 760px) { .aud-stats { grid-template-columns: repeat(2, 1fr); } }

  .aud-tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .aud-tbl thead th {
    background: var(--navy-tint);
    padding: 10px 16px;
    text-align: left;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    font-weight: 600;
    border-bottom: 1px solid var(--line-2);
  }
  .aud-tbl tbody td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--line-2);
    color: var(--ink-2);
    vertical-align: top;
  }
  .aud-tbl tbody tr:hover { background: var(--navy-tint); cursor: pointer; }
  .aud-tbl tbody tr.is-open { background: var(--navy-tint); }
  .aud-tbl .ts {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-3);
    white-space: nowrap;
  }
  .aud-tbl .acao {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--navy);
    font-weight: 600;
    white-space: nowrap;
  }
  .aud-tbl .user { font-weight: 500; }
  .aud-tbl .perfil-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    padding: 1px 7px;
    border-radius: 999px;
    background: var(--ambig-soft);
    color: var(--ambig);
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .aud-tbl .perfil-pill.operador { background: var(--navy-soft); color: var(--navy); }

  .aud-tbl .det-resumo {
    font-size: 11.5px;
    color: var(--ink-4);
    font-family: var(--font-mono);
  }
  .aud-det {
    background: var(--surface);
    padding: 0;
  }
  .aud-det pre {
    margin: 0;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
    background: var(--navy-tint);
    border-top: 1px solid var(--line-2);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.55;
    border-left: 3px solid var(--navy);
    margin-left: 30px;
  }

  @media (max-width: 760px) {
    .aud-tbl { min-width: 640px; }
  }

  .aud-load-more {
    padding: 14px;
    text-align: center;
    border-top: 1px solid var(--line-2);
  }
</style>
</head>
<body>

<div class="r2a-shell r2-app">
  <aside class="r2a-sidebar r2-side"></aside>

  <div class="r2a-main r2-main">
    <header class="r2a-topbar r2-top"></header>

    <div class="r2a-content r2-content">
      <section>

        <div class="aud-head">
          <div>
            <h1>Auditoria</h1>
            <p>Trilha imutável de todas as ações relevantes do sistema. Apenas administradores podem acessar.</p>
          </div>
          <div>
            <button class="r2-btn r2-btn--ghost" id="btn-export">⤓ Exportar CSV</button>
          </div>
        </div>

        <div class="aud-stats" id="aud-stats"></div>

        <div class="r2-card" style="margin-bottom: 14px;">
          <div class="r2-card__body">
            <div class="aud-filters">
              <div class="field">
                <label>De</label>
                <input type="date" id="f-ini">
              </div>
              <div class="field">
                <label>Até</label>
                <input type="date" id="f-fim">
              </div>
              <div class="field">
                <label>Usuário</label>
                <select id="f-user"><option value="all">Todos</option></select>
              </div>
              <div class="field">
                <label>Ação</label>
                <select id="f-acao"><option value="all">Todas</option></select>
              </div>
              <div class="actions">
                <button class="r2-btn r2-btn--ghost" id="btn-limpar">Limpar</button>
              </div>
            </div>
          </div>
        </div>

        <div class="r2-card">
          <div class="r2-card__head">
            <div>
              <h3 class="r2-card__title">Eventos</h3>
              <div class="r2-card__hint" id="head-hint">Carregando…</div>
            </div>
            <div>
              <input type="text" id="f-busca" placeholder="Buscar…" style="padding: 6px 10px; background: var(--navy-tint); border: 0; border-radius: var(--r-md); font-size: 12px; width: 200px;">
            </div>
          </div>
          <div class="r2-card__body r2-card__body--flush">
            <table class="aud-tbl">
              <thead>
                <tr>
                  <th style="width: 30px;"></th>
                  <th style="width: 150px;">Quando</th>
                  <th>Usuário</th>
                  <th>Ação</th>
                  <th>Detalhes</th>
                </tr>
              </thead>
              <tbody id="tbody-aud">
                <tr><td colspan="5" style="padding: 32px; text-align: center; color: var(--ink-4);">Carregando…</td></tr>
              </tbody>
            </table>
            <div class="aud-load-more" id="aud-load-more" style="display: none;">
              <button class="r2-btn r2-btn--ghost" id="btn-load-more">Carregar mais 100</button>
            </div>
          </div>
        </div>

      </section>
    </div>

    <footer class="r2a-footer r2-footer"></footer>
  </div>
</div>

<script src="config.js?v=0.31"></script>
<script src="shared.js?v=0.31"></script>
<script src="mock-data.js?v=0.31"></script>
<script src="data.js?v=0.31"></script>
<script>
  if (R2A.requireAuth()) {
    R2A.renderShell({ auditoria: true });
    R2A.renderFooter();
    R2A.data.init();

    const u = R2A.session.user();
    if (u.perfil !== 'admin') {
      document.querySelector('.r2-content').innerHTML = `
        <div class="r2-empty">
          <div class="icon">🔒</div>
          <h2>Acesso restrito</h2>
          <p>Apenas administradores podem acessar a auditoria. Você está como ${u.perfil || 'operador'}.</p>
          <a href="index.html" class="r2-btn r2-btn--primary" style="margin-top: 14px;">Voltar ao painel</a>
        </div>
      `;
    } else {
      iniciar();
    }

    async function iniciar() {
      const State = {
        eventos: [],
        filtered: [],
        pagina: 1,
        porPagina: 100
      };

      function uniqueValues(arr, key) {
        return [...new Set(arr.map(x => x[key]).filter(Boolean))].sort();
      }

      function fmtTs(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mn = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `${dd}/${mm}/${d.getFullYear()} ${hh}:${mn}:${ss}`;
      }

      function resumoDetalhes(det) {
        if (!det || typeof det !== 'object') return '—';
        const entries = Object.entries(det);
        if (entries.length === 0) return '—';
        const partes = entries.slice(0, 3).map(([k, v]) => {
          let txt;
          if (typeof v === 'object' && v !== null) txt = '…';
          else if (typeof v === 'string' && v.length > 40) txt = v.slice(0, 37) + '…';
          else txt = String(v);
          return `${k}: ${txt}`;
        });
        return partes.join(' · ') + (entries.length > 3 ? ' …' : '');
      }

      async function carregar() {
        document.getElementById('tbody-aud').innerHTML = R2A.skeleton.rows(6, ['w-8','w-15','w-20','w-15','w-30']);
        State.eventos = await R2A.data.list(R2A_CONFIG.COLLECTIONS.AUDITORIA);
        // Mais recentes primeiro
        State.eventos.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
        popularFiltros();
        // Restaurar filtros persistidos antes de aplicar
        const f = R2A.filtros.load('auditoria', null);
        if (f) {
          if (f.ini)  document.getElementById('f-ini').value  = f.ini;
          if (f.fim)  document.getElementById('f-fim').value  = f.fim;
          if (f.user) document.getElementById('f-user').value = f.user;
          if (f.acao) document.getElementById('f-acao').value = f.acao;
          if (f.q)    document.getElementById('f-busca').value = f.q;
        }
        aplicarFiltros();
      }

      function popularFiltros() {
        const users = uniqueValues(State.eventos, 'usuario_nome');
        const acoes = uniqueValues(State.eventos, 'acao');
        document.getElementById('f-user').innerHTML =
          '<option value="all">Todos</option>' + users.map(u => `<option value="${u}">${u}</option>`).join('');
        document.getElementById('f-acao').innerHTML =
          '<option value="all">Todas</option>' + acoes.map(a => `<option value="${a}">${a}</option>`).join('');
      }

      function aplicarFiltros() {
        const ini = document.getElementById('f-ini').value;
        const fim = document.getElementById('f-fim').value;
        const user = document.getElementById('f-user').value;
        const acao = document.getElementById('f-acao').value;
        const q = (document.getElementById('f-busca').value || '').toLowerCase().trim();
        // Persiste entre visitas
        R2A.filtros.save('auditoria', { ini, fim, user, acao, q });

        State.filtered = State.eventos.filter(e => {
          const data = (e.ts || '').slice(0, 10);
          if (ini && data < ini) return false;
          if (fim && data > fim) return false;
          if (user !== 'all' && e.usuario_nome !== user) return false;
          if (acao !== 'all' && e.acao !== acao) return false;
          if (q) {
            const txt = JSON.stringify(e).toLowerCase();
            if (!txt.includes(q)) return false;
          }
          return true;
        });

        State.pagina = 1;
        render();
      }

      function render() {
        const total = State.filtered.length;
        const fim = State.pagina * State.porPagina;
        const lista = State.filtered.slice(0, fim);

        document.getElementById('head-hint').textContent =
          `${total.toLocaleString('pt-BR')} evento(s)${total > lista.length ? ` · mostrando ${lista.length.toLocaleString('pt-BR')}` : ''}`;

        // Stats
        const hoje = new Date().toISOString().slice(0, 10);
        const seteDias = new Date(); seteDias.setDate(seteDias.getDate() - 7);
        const seteDiasISO = seteDias.toISOString().slice(0, 10);

        const stats = {
          total: total,
          hoje: State.filtered.filter(e => (e.ts || '').startsWith(hoje)).length,
          semana: State.filtered.filter(e => (e.ts || '').slice(0, 10) >= seteDiasISO).length,
          usuarios: uniqueValues(State.filtered, 'usuario_nome').length
        };
        document.getElementById('aud-stats').innerHTML = `
          <div class="r2-kpi">
            <div class="r2-kpi__head"><span class="r2-kpi__label">Total no filtro</span></div>
            <div class="r2-kpi__row"><span class="r2-kpi__value">${stats.total.toLocaleString('pt-BR')}</span></div>
            <div class="r2-kpi__sub">eventos auditados</div>
          </div>
          <div class="r2-kpi">
            <div class="r2-kpi__head"><span class="r2-kpi__label">Hoje</span></div>
            <div class="r2-kpi__row"><span class="r2-kpi__value">${stats.hoje}</span></div>
            <div class="r2-kpi__sub">eventos nas últimas 24h</div>
          </div>
          <div class="r2-kpi">
            <div class="r2-kpi__head"><span class="r2-kpi__label">Últimos 7 dias</span></div>
            <div class="r2-kpi__row"><span class="r2-kpi__value">${stats.semana}</span></div>
            <div class="r2-kpi__sub">eventos na última semana</div>
          </div>
          <div class="r2-kpi">
            <div class="r2-kpi__head"><span class="r2-kpi__label">Usuários distintos</span></div>
            <div class="r2-kpi__row"><span class="r2-kpi__value">${stats.usuarios}</span></div>
            <div class="r2-kpi__sub">no filtro atual</div>
          </div>
        `;

        // Tabela
        const tbody = document.getElementById('tbody-aud');
        if (lista.length === 0) {
          const temEventos = State.eventos.length > 0;
          const empty = temEventos
            ? R2A.emptyState({
                icon: '◌',
                titulo: 'Nenhum evento no filtro atual',
                sub: 'Tente ampliar o período ou limpar os filtros.',
                ctaText: 'Limpar filtros',
                ctaId: 'aud-empty-clear'
              })
            : R2A.emptyState({
                icon: '✓',
                titulo: 'Trilha de auditoria vazia',
                sub: 'A primeira ação relevante do sistema (login, conciliação, vínculo de parcela) aparecerá aqui.'
              });
          tbody.innerHTML = `<tr><td colspan="5" style="padding: 0;">${empty}</td></tr>`;
          const c = document.getElementById('aud-empty-clear');
          if (c) c.addEventListener('click', () => document.getElementById('btn-limpar').click());
        } else {
          tbody.innerHTML = lista.map((e, i) => {
            const perfilClass = e.usuario_perfil === 'operador' ? 'operador' : '';
            const detalhesObj = e.detalhes || {};
            // log antigo armazenava os detalhes inline no doc; tenta extrair também
            const detExtra = {};
            Object.keys(e).forEach(k => {
              if (!['id', 'acao', 'usuario_uid', 'usuario_nome', 'usuario_perfil', 'ts', 'detalhes', 'criado_em', 'atualizado_em'].includes(k)) {
                detExtra[k] = e[k];
              }
            });
            const detFull = { ...detalhesObj, ...detExtra };
            return `
              <tr data-i="${i}">
                <td style="text-align: center; color: var(--ink-5);">▸</td>
                <td><span class="ts">${fmtTs(e.ts)}</span></td>
                <td>
                  <span class="user">${e.usuario_nome || '—'}</span>
                  ${e.usuario_perfil ? `<span class="perfil-pill ${perfilClass}">${e.usuario_perfil}</span>` : ''}
                </td>
                <td><span class="acao">${e.acao || '—'}</span></td>
                <td><span class="det-resumo">${resumoDetalhes(detFull)}</span></td>
              </tr>
              <tr id="det-${i}" style="display: none;">
                <td colspan="5" class="aud-det">
                  <pre>${escapeHtml(JSON.stringify(detFull, null, 2))}</pre>
                </td>
              </tr>
            `;
          }).join('');

          tbody.querySelectorAll('tr[data-i]').forEach(tr => {
            tr.addEventListener('click', () => {
              const i = tr.dataset.i;
              const det = document.getElementById('det-' + i);
              const aberto = det.style.display !== 'none';
              det.style.display = aberto ? 'none' : '';
              tr.classList.toggle('is-open', !aberto);
              tr.querySelector('td').textContent = aberto ? '▸' : '▾';
            });
          });
        }

        const loadMore = document.getElementById('aud-load-more');
        loadMore.style.display = total > lista.length ? '' : 'none';
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }

      function exportarCSV() {
        const headers = ['quando', 'usuario_nome', 'usuario_perfil', 'acao', 'detalhes'];
        const linhas = State.filtered.map(e => [
          fmtTs(e.ts),
          (e.usuario_nome || '').replace(/"/g, '""'),
          (e.usuario_perfil || ''),
          (e.acao || '').replace(/"/g, '""'),
          JSON.stringify(e.detalhes || {}).replace(/"/g, '""')
        ].map(v => `"${v}"`).join(';'));
        const csv = '﻿' + headers.join(';') + '\n' + linhas.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `auditoria_${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        R2A.toast(`${State.filtered.length} evento(s) exportado(s)`, 'success');
      }

      // Bindings
      ['f-ini', 'f-fim', 'f-user', 'f-acao'].forEach(id => {
        document.getElementById(id).addEventListener('change', aplicarFiltros);
      });
      document.getElementById('f-busca').addEventListener('input', () => {
        clearTimeout(window._audBuscaTimer);
        window._audBuscaTimer = setTimeout(aplicarFiltros, 200);
      });
      document.getElementById('btn-limpar').addEventListener('click', () => {
        ['f-ini', 'f-fim', 'f-busca'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-user').value = 'all';
        document.getElementById('f-acao').value = 'all';
        R2A.filtros.clear('auditoria');
        aplicarFiltros();
      });
      document.getElementById('btn-load-more').addEventListener('click', () => {
        State.pagina++;
        render();
      });
      document.getElementById('btn-export').addEventListener('click', exportarCSV);

      await carregar();
    }
  }
</script>

</body>
</html>
