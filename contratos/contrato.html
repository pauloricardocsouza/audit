<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrato · R2 Audit</title>
<link rel="stylesheet" href="../styles/theme.css?v=0.27">
<link rel="stylesheet" href="../shared.css?v=0.27">
<link rel="stylesheet" href="contratos.css?v=0.27">
<style>
  .parcela-acoes { display: flex; gap: 4px; justify-content: center; }
  .parcela-acoes .btn-sm { padding: 3px 8px; font-size: 10px; }
  .ct-vinc-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ct-vinc-tbl thead th {
    background: var(--surface-2);
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  .ct-vinc-tbl thead th.num { text-align: right; }
  .ct-vinc-tbl tbody td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .ct-vinc-tbl tbody td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .ct-vinc-tbl tbody tr { cursor: pointer; transition: background 0.1s; }
  .ct-vinc-tbl tbody tr:hover { background: var(--accent-bg); }
  .ct-vinc-tbl .diff-warn { color: var(--warning); font-family: var(--font-mono); font-size: 10px; }
  .vinc-info {
    background: var(--accent-bg);
    border-left: 3px solid var(--accent-text);
    padding: 10px 12px;
    border-radius: 4px;
    margin-bottom: 12px;
    font-size: 12px;
  }
  .vinc-info strong { color: var(--accent-text); }
  .ct-parcela-status.status-pago { color: var(--success-text); }
  .ct-parcela-status.status-pago_menor { color: var(--warning); }
  .ct-parcela-status.status-pago_maior { color: var(--violet-text); }
  .ct-parcela-status.status-atraso { color: var(--danger-text); }
  .ct-parcela-status.status-aberta { color: var(--text-muted); }
  .ct-parcela-status.status-carencia { color: var(--muted); font-style: italic; }
  .vinc-badge { font-family: var(--font-mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
  .vinc-badge.manual { background: var(--accent-bg); color: var(--accent-text); }
  .vinc-badge.auto { background: var(--surface-3); color: var(--text-dim); }
</style>
</head>
<body>

<div class="r2a-shell">
  <aside class="r2a-sidebar"></aside>

  <div class="r2a-main">
    <header class="r2a-topbar"></header>

    <div class="r2a-content">
      <section class="ct-wrap" id="cnt-wrap">
        <div style="text-align:center; padding: 60px; color: var(--muted);">Carregando contrato…</div>
      </section>
    </div>

    <footer class="r2a-footer"></footer>
  </div>
</div>

<!-- Modal vincular parcela -->
<div class="r2a-modal-backdrop" id="modal-vinc">
  <div class="r2a-modal" style="max-width: 760px;">
    <div class="r2a-modal-header">
      <h3 class="r2a-modal-title" id="modal-vinc-title">Vincular parcela</h3>
      <button class="r2a-modal-close" id="modal-vinc-close" aria-label="Fechar">✕</button>
    </div>
    <div class="r2a-modal-body" id="modal-vinc-body"></div>
    <div class="r2a-modal-footer">
      <button class="btn" id="modal-vinc-cancel">Cancelar</button>
    </div>
  </div>
</div>

<!-- jsPDF para exportação do relatório do contrato -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>

<script src="../config.js?v=0.27"></script>
<script src="../shared.js?v=0.27"></script>
<script src="../mock-data.js?v=0.27"></script>
<script src="../data.js?v=0.27"></script>
<script src="contratos.js?v=0.27"></script>
<script>
  if (R2A.requireAuth()) {
    R2A.renderShell({ modulo: 'contratos', item: 'contratos' });
    R2A.renderFooter();
    R2A.data.init();

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { window.location.href = 'contratos.html'; }

    const wrap = document.getElementById('cnt-wrap');
    const modal = document.getElementById('modal-vinc');
    const modalTitle = document.getElementById('modal-vinc-title');
    const modalBody = document.getElementById('modal-vinc-body');

    // ------------------------------------------------------------
    // FECHA MODAL
    // ------------------------------------------------------------
    function fecharModal() { modal.classList.remove('open'); }
    document.getElementById('modal-vinc-close').addEventListener('click', fecharModal);
    document.getElementById('modal-vinc-cancel').addEventListener('click', fecharModal);
    modal.addEventListener('click', e => { if (e.target === modal) fecharModal(); });

    // ------------------------------------------------------------
    // ABRE MODAL DE VÍNCULO MANUAL
    // ------------------------------------------------------------
    async function abrirModalVincular(parc, contrato) {
      modalTitle.textContent = `Vincular parcela ${parc.n} · ${R2A.fmt.data(parc.vencimento)}`;
      const todosLancs = await R2A.data.list(R2A_CONFIG.COLLECTIONS.LANCAMENTOS_BANCO);
      const valorEsperado = Math.abs(parc.valor);
      const vencDate = new Date(parc.vencimento);

      // candidatos: dentro da tolerância (preferidos no topo); + todos os outros débitos não vinculados
      const candidatos = parc.candidatos || [];
      const idsCandidatos = new Set(candidatos.map(c => c.id));
      const outros = todosLancs.filter(b =>
        b.tipo === 'D' &&
        !b.vinculo_contrato &&
        !idsCandidatos.has(b.id)
      ).map(b => ({
        ...b,
        _diffPct: Math.abs(Math.abs(b.valor) - valorEsperado) / (valorEsperado || 1),
        _diasDiff: Math.abs((new Date(b.data) - vencDate) / (1000 * 60 * 60 * 24))
      })).sort((a, b) => (a._diasDiff + a._diffPct) - (b._diasDiff + b._diffPct))
        .slice(0, 20);

      function linhaCandidato(b, dentroTol) {
        const valor = Math.abs(b.valor);
        const diff = valor - valorEsperado;
        const pct = (Math.abs(diff) / valorEsperado * 100).toFixed(1);
        return `
          <tr data-id="${b.id}">
            <td>${R2A.fmt.data(b.data)}${b._diasDiff !== undefined && b._diasDiff > 5 ? ` <span class="diff-warn">+${Math.round(b._diasDiff)}d</span>` : ''}</td>
            <td>${b.hist || ''}</td>
            <td class="num">${R2A.fmt.moeda(valor, { sinal: false })}</td>
            <td class="num">${diff >= 0 ? '+' : ''}${R2A.fmt.moeda(diff, { sinal: false })}${Math.abs(diff)/valorEsperado > 0.05 ? ` <span class="diff-warn">${pct}%</span>` : ''}</td>
            <td class="center">${dentroTol ? '<span class="tag grn">na tolerância</span>' : '<span class="tag mut">fora tol.</span>'}</td>
          </tr>
        `;
      }

      modalBody.innerHTML = `
        <div class="vinc-info">
          <strong>Esperado:</strong> ${R2A.fmt.moeda(valorEsperado, { sinal: false })} em ${R2A.fmt.data(parc.vencimento)}.
          Tolerância automática: data ±5 dias, valor ±5%.
        </div>
        ${candidatos.length > 0 ? `
          <h4 style="font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;">Candidatos dentro da tolerância (${candidatos.length})</h4>
          <table class="ct-vinc-tbl" style="margin-bottom: 18px;">
            <thead>
              <tr><th>Data</th><th>Histórico</th><th class="num">Valor</th><th class="num">Diferença</th><th class="center">Status</th></tr>
            </thead>
            <tbody>${candidatos.map(b => linhaCandidato(b, true)).join('')}</tbody>
          </table>
        ` : '<p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">Nenhum candidato dentro da tolerância automática.</p>'}

        ${outros.length > 0 ? `
          <h4 style="font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;">Outros débitos disponíveis (top ${outros.length})</h4>
          <table class="ct-vinc-tbl">
            <thead>
              <tr><th>Data</th><th>Histórico</th><th class="num">Valor</th><th class="num">Diferença</th><th class="center">Status</th></tr>
            </thead>
            <tbody>${outros.map(b => linhaCandidato(b, false)).join('')}</tbody>
          </table>
        ` : ''}
      `;

      // Click handler em qualquer linha → confirma e vincula
      modalBody.querySelectorAll('tr[data-id]').forEach(tr => {
        tr.addEventListener('click', async () => {
          const lancId = tr.dataset.id;
          const ok = await R2A.confirm(`Vincular este lançamento à parcela ${parc.n}?`);
          if (!ok) return;
          try {
            await R2A.contratos.vincularParcela(contrato.id, parc.n, lancId);
            fecharModal();
            R2A.toast(`Parcela ${parc.n} vinculada`, 'success');
            await render();
          } catch (e) {
            console.error(e);
            const msg = e.code === 'PERIODO_FECHADO' ? e.message : ('Erro ao vincular: ' + (e.message || 'desconhecido'));
            R2A.toast(msg, 'error', 5000);
          }
        });
      });

      modal.classList.add('open');
    }

    // ------------------------------------------------------------
    // DESVINCULAR
    // ------------------------------------------------------------
    async function desvincular(lancId, parcelaN) {
      const ok = await R2A.confirm(`Desvincular a parcela ${parcelaN}?`);
      if (!ok) return;
      try {
        await R2A.contratos.desvincularParcela(lancId);
        R2A.toast(`Parcela ${parcelaN} desvinculada`, 'success');
        await render();
      } catch (e) {
        console.error(e);
        const msg = e.code === 'PERIODO_FECHADO' ? e.message : ('Erro ao desvincular: ' + (e.message || 'desconhecido'));
        R2A.toast(msg, 'error', 5000);
      }
    }

    // ------------------------------------------------------------
    // AUTO-VINCULAR
    // ------------------------------------------------------------
    async function autoVincular() {
      const ok = await R2A.confirm('Vincular automaticamente todas as parcelas com candidato único dentro da tolerância (data ±5d, valor ±5%)?');
      if (!ok) return;
      try {
        const r = await R2A.contratos.autoVincular(id);
        const extras = [];
        if (r.ambiguos) extras.push(`${r.ambiguos} ambíguo(s) precisam de revisão manual`);
        if (r.bloqueados) extras.push(`${r.bloqueados} bloqueada(s) por mês fechado`);
        R2A.toast(`${r.vinculados} vinculada(s) automaticamente${extras.length ? ' · ' + extras.join(' · ') : ''}`, 'success', 5000);
        await render();
      } catch (e) {
        console.error(e);
        R2A.toast('Erro no auto-vincular: ' + (e.message || 'desconhecido'), 'error');
      }
    }

    // expor handlers no window pra usar em onclick inline
    window._ctrAcoes = { vincular: null, desvincular };

    // ------------------------------------------------------------
    // RENDER
    // ------------------------------------------------------------
    async function render() {
      const c = await R2A.contratos.get(id);
      if (!c) {
        wrap.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>Contrato não encontrado</p><a href="contratos.html" class="btn">Voltar à lista</a></div>`;
        return;
      }
      const lancamentos = await R2A.data.list(R2A_CONFIG.COLLECTIONS.LANCAMENTOS_BANCO);
      const parcelas = R2A.contratos.matchParcelas(c, lancamentos);

      // bind do vincular pra cada parcela
      window._ctrAcoes.vincular = (n) => {
        const parc = parcelas.find(p => p.n === n);
        if (parc) abrirModalVincular(parc, c);
      };

      const banco = `${c.banco}${c.banco_codigo_bacen ? ` · ${c.banco_codigo_bacen}` : ''}`;
      const taxa = R2A.contratos.fmtTaxa(c.taxa_juros);
      const sistema = R2A.contratos.fmtSistema(c.estrutura.sistema_amortizacao_detectado);
      const cet = c.taxa_juros.cet_aa ? (c.taxa_juros.cet_aa * 100).toFixed(4) + '% a.a.' : '—';

      const pagas = parcelas.filter(p => p.status === 'pago' || p.status === 'pago_maior' || p.status === 'pago_menor').length;
      const totalAmort = parcelas.filter(p => p.tipo !== 'carencia' && p.valor > 0).length;
      const valorPrev = parcelas.reduce((s, p) => s + (p.valor || 0), 0);
      const valorPago = parcelas.reduce((s, p) => s + (p.pago ? p.pago.valor : 0), 0);
      const pctCumprimento = totalAmort > 0 ? Math.round((pagas / totalAmort) * 100) : 0;
      const atrasos = parcelas.filter(p => p.status === 'atraso').length;

      const garantiasHtml = (c.garantias || []).map(g => {
        const tagClass = g.tipo === 'aval' ? 'tag mut' : g.tipo === 'cessao_fiduciaria' ? 'tag hl' : g.tipo === 'fundo_garantidor' ? 'tag grn' : 'tag acc';
        return `<span class="${tagClass}">${g.tipo.replace(/_/g, ' ')}${g.percentual ? ` ${g.percentual}%` : ''}</span>`;
      }).join('');

      const cenariosTaxa = (c.taxa_juros.cenarios_alternativos || []).map(cn => `
        <div class="ct-info-sub">
          ${cn.descricao}: ${cn.am ? (cn.am * 100).toFixed(4) + '% a.m.' : ''}
          ${cn.aa ? ` · ${(cn.aa * 100).toFixed(4)}% a.a.` : ''}
        </div>
      `).join('');

      const flagsQ = c.qualidade_extracao || {};
      const flagsHtml = [
        flagsQ.pdf_escaneado ? '<span class="tag dnd">PDF escaneado</span>' : null,
        flagsQ.checkbox_amortizacao_marcado === false ? '<span class="tag hl">amort. não marcada</span>' : null,
        !flagsQ.cet_informado ? '<span class="tag mut">CET não informado</span>' : null,
        flagsQ.campos_faltantes && flagsQ.campos_faltantes.length ? `<span class="tag mut">${flagsQ.campos_faltantes.length} campo(s) faltante(s)</span>` : null
      ].filter(Boolean).join(' ');

      wrap.innerHTML = `
        <div class="ct-page-head">
          <div class="ct-page-title">
            <h1>${banco}</h1>
            <p style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em;">
              Contrato ${c.numero_contrato} · ${R2A.contratos.fmtProduto(c.produto)}
            </p>
          </div>
          <div class="ct-page-actions">
            <a href="contratos.html" class="btn btn-ghost">← Voltar</a>
            <button class="btn" id="btn-export-pdf" title="Gerar relatório consolidado do contrato em PDF">⤓ Relatório PDF</button>
            ${(function () {
              const p = c.pdf_original;
              if (!p) return '<button class="btn" disabled title="Nenhum PDF anexado">⤓ Sem PDF</button>';
              const tamanho = p.tamanho_kb ? ` · ${(p.tamanho_kb / 1024).toFixed(1)} MB` : '';
              if (p.url) return `<a href="${p.url}" download="${p.nome}" class="btn btn-primary" title="${p.nome}${tamanho}">⤓ PDF original</a>`;
              return `<button class="btn" disabled title="Arquivo: ${p.nome}${tamanho} · ainda não anexado (Fase 5)">⤓ ${p.nome}</button>`;
            })()}
          </div>
        </div>

        <!-- KPIs do contrato -->
        <div class="ct-kpi-grid">
          <div class="kpi">
            <div class="label">Principal</div>
            <div class="value">${R2A.fmt.moeda(c.valores.principal, { sinal: false })}</div>
            <div class="sub">contratado</div>
          </div>
          <div class="kpi up">
            <div class="label">Líquido liberado</div>
            <div class="value">${c.valores.liquido_liberado ? R2A.fmt.moeda(c.valores.liquido_liberado, { sinal: false }) : '—'}</div>
            <div class="sub">${c.valores.iof ? 'IOF ' + R2A.fmt.moeda(c.valores.iof, { sinal: false }) : ''} ${c.valores.tarifas ? ' · Tarifas ' + R2A.fmt.moeda(c.valores.tarifas, { sinal: false }) : ''}</div>
          </div>
          <div class="kpi ${atrasos > 0 ? 'dn' : 'hl'}">
            <div class="label">Cumprimento</div>
            <div class="value">${pctCumprimento}<span class="unit">%</span></div>
            <div class="sub">${pagas} de ${totalAmort} parcelas vinculadas${atrasos > 0 ? ` · ${atrasos} em atraso` : ''}</div>
          </div>
          <div class="kpi">
            <div class="label">Pago vs previsto</div>
            <div class="value">${R2A.fmt.moeda(valorPago, { sinal: false })}</div>
            <div class="sub">de ${R2A.fmt.moeda(valorPrev, { sinal: false })} previsto</div>
          </div>
        </div>

        <div class="ct-detail-grid">
          <div>
            <div class="ct-panel">
              <div class="ct-panel-head">
                <div>
                  <h3>Cronograma de parcelas</h3>
                  <div class="sub">${c.qualidade_extracao && c.qualidade_extracao.cronograma_extraido ? 'extraído do anexo de parcelas' : 'simulado'} · ${c.cronograma_parcelas.length} parcelas</div>
                </div>
                <div style="display: flex; gap: 8px; align-items: center;">
                  ${flagsHtml}
                  <button class="btn btn-primary btn-sm" id="btn-auto-vinc">⟳ Auto-vincular</button>
                </div>
              </div>
              <div class="ct-panel-body flush">
                <div class="ct-cronograma">
                  <table>
                    <thead>
                      <tr>
                        <th class="center">#</th>
                        <th>Vencimento</th>
                        <th class="num">Esperado</th>
                        <th class="num">Pago</th>
                        <th class="num">Diferença</th>
                        <th class="center">Status</th>
                        <th class="center">Ação</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${parcelas.map(p => {
                        const rowClass = p.status === 'carencia' ? 'carencia' : p.pago ? 'paga' : p.status === 'atraso' ? 'atraso' : 'aberta';
                        const statusLabel = {
                          'pago': 'pago',
                          'pago_menor': 'pago a menor',
                          'pago_maior': 'pago a maior',
                          'atraso': 'em atraso',
                          'aberta': 'aberta',
                          'carencia': 'carência'
                        }[p.status] || p.status;
                        const badge = p.pago
                          ? (p.pago.vinculoManual
                              ? '<span class="vinc-badge manual" title="vinculo manual">M</span>'
                              : '<span class="vinc-badge auto" title="match automático sugerido">~</span>')
                          : '';
                        const acoes = p.tipo === 'carencia' ? '—'
                          : p.pago && p.pago.vinculoManual
                            ? `<button class="btn btn-ghost btn-sm" onclick="window._ctrAcoes.desvincular('${p.pago.ref}', ${p.n})">desvincular</button>`
                          : `<button class="btn btn-sm" onclick="window._ctrAcoes.vincular(${p.n})">${p.pago ? 'confirmar' : 'vincular'}</button>`;
                        return `
                          <tr class="${rowClass}">
                            <td class="center">${p.n}</td>
                            <td>${R2A.fmt.data(p.vencimento)}</td>
                            <td class="num">${p.valor > 0 ? R2A.fmt.moeda(p.valor, { sinal: false }) : '—'}</td>
                            <td class="num">${p.pago ? R2A.fmt.moeda(p.pago.valor, { sinal: false }) + badge : '—'}</td>
                            <td class="num">${p.pago && p.pago.diferenca ? (p.pago.diferenca > 0 ? '+' : '') + R2A.fmt.moeda(p.pago.diferenca, { sinal: false }) : '—'}</td>
                            <td class="center"><span class="ct-parcela-status status-${p.status}">${statusLabel}</span></td>
                            <td class="center"><div class="parcela-acoes">${acoes}</div></td>
                          </tr>
                        `;
                      }).join('')}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="ct-panel">
              <div class="ct-panel-head"><div><h3>Tomador e garantias</h3></div></div>
              <div class="ct-panel-body">
                <div class="ct-info-grid">
                  <div class="ct-info" style="grid-column: span 3;">
                    <span class="ct-info-label">Razão social</span>
                    <span class="ct-info-value">${c.tomador.razao_social}</span>
                    <span class="ct-info-sub">${c.tomador.cnpj || ''}</span>
                  </div>
                  ${(c.avalistas || []).map(a => `
                    <div class="ct-info" style="grid-column: span 3;">
                      <span class="ct-info-label">Avalista</span>
                      <span class="ct-info-value">${a.nome}</span>
                      <span class="ct-info-sub">${a.cpf_cnpj || ''}</span>
                    </div>
                  `).join('')}
                </div>
                <div style="margin-top: 14px;">
                  <span class="ct-info-label" style="display: block; margin-bottom: 6px;">Garantias</span>
                  <div class="ct-tag-row">${garantiasHtml || '<span class="muted">nenhuma</span>'}</div>
                </div>
              </div>
            </div>

            <div class="ct-panel">
              <div class="ct-panel-head"><div><h3>Condições financeiras</h3></div></div>
              <div class="ct-panel-body">
                <div class="ct-info-grid" style="grid-template-columns: repeat(2, 1fr);">
                  <div class="ct-info">
                    <span class="ct-info-label">Taxa</span>
                    <span class="ct-info-value">${taxa}</span>
                    ${cenariosTaxa}
                  </div>
                  <div class="ct-info">
                    <span class="ct-info-label">CET</span>
                    <span class="ct-info-value">${cet}</span>
                  </div>
                  <div class="ct-info">
                    <span class="ct-info-label">Sistema</span>
                    <span class="ct-info-value">${sistema}</span>
                    ${c.estrutura.sistema_amortizacao_declarado !== c.estrutura.sistema_amortizacao_detectado
                      ? `<span class="ct-info-sub">declarado: ${R2A.contratos.fmtSistema(c.estrutura.sistema_amortizacao_declarado)}</span>` : ''}
                  </div>
                  <div class="ct-info">
                    <span class="ct-info-label">Carência</span>
                    <span class="ct-info-value">${c.estrutura.carencia.meses} ${c.estrutura.carencia.meses === 1 ? 'mês' : 'meses'}</span>
                    ${c.estrutura.carencia.fonte !== 'nenhuma' ? `<span class="ct-info-sub">fonte: ${c.estrutura.carencia.fonte.replace(/_/g, ' ')}</span>` : ''}
                  </div>
                  <div class="ct-info">
                    <span class="ct-info-label">Emissão</span>
                    <span class="ct-info-value">${R2A.fmt.data(c.datas.emissao)}</span>
                  </div>
                  <div class="ct-info">
                    <span class="ct-info-label">Última parcela</span>
                    <span class="ct-info-value">${R2A.fmt.data(c.datas.ultima_parcela)}</span>
                  </div>
                  <div class="ct-info" style="grid-column: span 2;">
                    <span class="ct-info-label">Conta de débito</span>
                    <span class="ct-info-value">
                      ${c.conta_debito.banco || ''} · ag. ${c.conta_debito.agencia || '—'} · c/c ${c.conta_debito.numero || '—'}
                    </span>
                  </div>
                </div>
              </div>
            </div>

            ${(c.instrumentos_relacionados || []).length > 0 ? `
              <div class="ct-panel">
                <div class="ct-panel-head"><div><h3>Instrumentos relacionados</h3></div></div>
                <div class="ct-panel-body">
                  ${c.instrumentos_relacionados.map(i => `
                    <div class="ct-info" style="margin-bottom: 8px;">
                      <span class="ct-info-label">${i.tipo.replace(/_/g, ' ')}</span>
                      <span class="ct-info-value" style="font-family: var(--font-mono); font-size: 12px;">${i.numero}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      document.getElementById('btn-auto-vinc').addEventListener('click', autoVincular);
      const btnExp = document.getElementById('btn-export-pdf');
      if (btnExp) btnExp.addEventListener('click', () => exportarPDF(c, parcelas));
    }

    // ------------------------------------------------------------
    // EXPORTAR RELATÓRIO PDF DO CONTRATO
    // ------------------------------------------------------------
    function exportarPDF(c, parcelas) {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        R2A.toast('jsPDF não carregou · recarregue a página', 'error');
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', format: 'a4' });
      const NAVY = [26, 58, 82];
      const INK = [15, 23, 42];
      const MUTE = [100, 116, 139];
      const OK = [22, 163, 74];
      const ERR = [220, 38, 38];
      const WARN = [217, 119, 6];

      // Header navy gradient (simulado com retângulo cheio)
      doc.setFillColor(...NAVY);
      doc.rect(0, 0, 210, 36, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(8.5);
      doc.text('R2 AUDIT · PLATAFORMA DE AUDITORIA', 14, 11);
      doc.setFontSize(15);
      doc.setFont(undefined, 'bold');
      doc.text('Relatório do contrato', 14, 21);
      doc.setFontSize(9);
      doc.setFont(undefined, 'normal');
      doc.text(`${c.banco} · ${c.numero_contrato}`, 14, 29);

      // Resumo / KPIs
      doc.setTextColor(...INK);
      let y = 46;
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('Identificação', 14, y);
      y += 5;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(9);

      const tomador = c.tomador || {};
      const taxa = R2A.contratos.fmtTaxa(c.taxa_juros);
      const sistema = R2A.contratos.fmtSistema(c.estrutura.sistema_amortizacao_detectado);
      const cet = c.taxa_juros.cet_aa ? (c.taxa_juros.cet_aa * 100).toFixed(4) + '% a.a.' : '—';

      const linhas = [
        ['Tomador', tomador.razao_social || '—', 'CNPJ', tomador.cnpj || '—'],
        ['Produto', R2A.contratos.fmtProduto(c.produto), 'Sistema', sistema],
        ['Principal', R2A.fmt.moeda(c.valores.principal, { sinal: false }), 'Líquido liberado', c.valores.liquido_liberado ? R2A.fmt.moeda(c.valores.liquido_liberado, { sinal: false }) : '—'],
        ['IOF', c.valores.iof ? R2A.fmt.moeda(c.valores.iof, { sinal: false }) : '—', 'Tarifas', c.valores.tarifas ? R2A.fmt.moeda(c.valores.tarifas, { sinal: false }) : '—'],
        ['Emissão', R2A.fmt.data(c.datas.emissao), '1ª parcela', R2A.fmt.data(c.datas.primeira_parcela)],
        ['Prazo', `${c.estrutura.prazo_meses} meses`, 'Carência', `${c.estrutura.carencia.meses} meses`],
        ['Taxa', taxa, 'CET', cet],
        ['Conta débito', `${c.conta_debito.banco || ''} ag. ${c.conta_debito.agencia || '—'} c/c ${c.conta_debito.numero || '—'}`, 'Estado', c.estado]
      ];

      linhas.forEach(([k1, v1, k2, v2]) => {
        doc.setTextColor(...MUTE);
        doc.text(k1, 14, y);
        doc.text(k2, 110, y);
        doc.setTextColor(...INK);
        doc.text(String(v1).slice(0, 60), 44, y);
        doc.text(String(v2).slice(0, 60), 140, y);
        y += 5;
      });

      // Sumário do cumprimento
      y += 4;
      doc.setFont(undefined, 'bold');
      doc.setFontSize(10);
      doc.text('Cumprimento', 14, y);
      y += 5;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(9);
      const totalAmort = parcelas.filter(p => p.tipo !== 'carencia' && p.valor > 0).length;
      const pagas = parcelas.filter(p => p.status === 'pago' || p.status === 'pago_maior' || p.status === 'pago_menor').length;
      const atrasos = parcelas.filter(p => p.status === 'atraso').length;
      const valorPrev = parcelas.reduce((s, p) => s + (p.valor || 0), 0);
      const valorPago = parcelas.reduce((s, p) => s + (p.pago ? p.pago.valor : 0), 0);
      const pct = totalAmort > 0 ? Math.round((pagas / totalAmort) * 100) : 0;

      doc.setTextColor(...MUTE);
      doc.text('Pagas / total', 14, y);
      doc.text('Em atraso', 70, y);
      doc.text('Pago acumulado', 120, y);
      doc.text('Previsto total', 170, y);
      doc.setTextColor(...INK);
      doc.setFont(undefined, 'bold');
      y += 5;
      doc.text(`${pagas} / ${totalAmort}  (${pct}%)`, 14, y);
      doc.setTextColor(atrasos > 0 ? ERR[0] : INK[0], atrasos > 0 ? ERR[1] : INK[1], atrasos > 0 ? ERR[2] : INK[2]);
      doc.text(`${atrasos}`, 70, y);
      doc.setTextColor(...INK);
      doc.text(R2A.fmt.moeda(valorPago, { sinal: false }), 120, y);
      doc.text(R2A.fmt.moeda(valorPrev, { sinal: false }), 170, y);
      doc.setFont(undefined, 'normal');
      y += 8;

      // Tabela do cronograma
      const body = parcelas.map(p => {
        const statusLabel = {
          'pago': 'pago',
          'pago_menor': 'pago a menor',
          'pago_maior': 'pago a maior',
          'atraso': 'em atraso',
          'aberta': 'aberta',
          'carencia': 'carência'
        }[p.status] || p.status;
        return [
          String(p.n),
          R2A.fmt.data(p.vencimento),
          p.valor > 0 ? R2A.fmt.moeda(p.valor, { sinal: false }) : '—',
          p.pago ? R2A.fmt.moeda(p.pago.valor, { sinal: false }) : '—',
          p.pago && p.pago.diferenca ? (p.pago.diferenca > 0 ? '+' : '') + R2A.fmt.moeda(p.pago.diferenca, { sinal: false }) : '—',
          statusLabel
        ];
      });

      doc.autoTable({
        startY: y,
        head: [['#', 'Vencimento', 'Esperado', 'Pago', 'Diferença', 'Status']],
        body,
        theme: 'grid',
        headStyles: { fillColor: NAVY, textColor: [255, 255, 255], fontSize: 8.5, fontStyle: 'bold' },
        bodyStyles: { fontSize: 8, textColor: INK, lineColor: [226, 232, 240] },
        alternateRowStyles: { fillColor: [245, 248, 251] },
        columnStyles: {
          0: { halign: 'center', cellWidth: 12 },
          1: { cellWidth: 28 },
          2: { halign: 'right', cellWidth: 30 },
          3: { halign: 'right', cellWidth: 30 },
          4: { halign: 'right', cellWidth: 30 },
          5: { cellWidth: 32, fontStyle: 'bold' }
        },
        didParseCell: function (data) {
          if (data.section === 'body' && data.column.index === 5) {
            const v = data.cell.raw;
            if (v === 'em atraso') data.cell.styles.textColor = ERR;
            else if (v === 'pago') data.cell.styles.textColor = OK;
            else if (v === 'pago a menor') data.cell.styles.textColor = WARN;
            else if (v === 'carência') data.cell.styles.textColor = MUTE;
          }
        },
        margin: { left: 14, right: 14 }
      });

      // Footer com paginação
      const pageCount = doc.internal.getNumberOfPages();
      const u = R2A.session.user();
      const ts = new Date().toLocaleString('pt-BR');
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(7);
        doc.setTextColor(...MUTE);
        doc.text(`Gerado em ${ts} por ${u.nome} · R2 Audit v${R2A_CONFIG.APP_VERSION}`, 14, 290);
        doc.text(`Página ${i} de ${pageCount}`, 196, 290, { align: 'right' });
      }

      const nome = `Contrato_${(c.numero_contrato || c.id).replace(/[^\w]/g, '_')}_${new Date().toISOString().slice(0, 10)}.pdf`;
      doc.save(nome);
      R2A.auditar('contrato.exportar_pdf', { contratoId: c.id, numero: c.numero_contrato });
      R2A.toast('Relatório PDF gerado', 'success');
    }

    render();
  }
</script>
