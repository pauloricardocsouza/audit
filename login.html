<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · R2 Audit</title>
<link rel="stylesheet" href="shared.css?v=0.9">
<style>
  body { background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-card { width: 100%; max-width: 380px; background: white; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); overflow: hidden; }
  .login-head { padding: 28px 28px 20px; text-align: center; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; }
  .login-head .logo { display: block; margin: 0 auto 14px; max-width: 220px; width: 100%; height: auto; }
  .login-head h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
  .login-head p { font-size: 12px; opacity: 0.85; }
  .login-body { padding: 24px 28px 28px; }
  .login-body .field { margin-bottom: 14px; }
  .login-body label { margin-bottom: 6px; }
  .login-body input { width: 100%; padding: 9px 12px; font-size: 13px; }
  .login-body .btn { width: 100%; justify-content: center; padding: 10px; font-size: 13px; }
  .login-footer { padding: 12px; text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); background: var(--surface-2); }
  .err { background: var(--danger-bg); color: var(--danger); padding: 8px 12px; border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; display: none; }
  .err.show { display: block; }
  .dev-hint { background: var(--warning-bg); color: var(--warning); padding: 8px 12px; border-radius: var(--radius); font-size: 11px; margin-bottom: 14px; text-align: center; }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-head">
    <img class="logo" src="logoR2branco.png" alt="R2 Soluções Empresariais">
    <h1>R2 Audit</h1>
    <p>Plataforma de auditoria</p>
  </div>

  <div class="login-body">
    <div class="dev-hint" id="dev-hint" style="display:none;">
      Modo desenvolvimento · qualquer e-mail e senha funcionam
    </div>

    <div class="err" id="err"></div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="username">
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="btn-login">Entrar</button>
  </div>

  <div class="login-footer">
    R2 SOLUÇÕES EMPRESARIAIS · v0.9
  </div>
</div>

<script src="config.js?v=0.9"></script>
<script src="shared.js?v=0.9"></script>
<script>
  if (R2A_CONFIG.MODO_DEV) document.getElementById('dev-hint').style.display = 'block';
  if (R2A.session.isLoggedIn()) window.location.href = 'index.html';

  function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.classList.add('show'); }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    if (!email || !senha) { showErr('Preencha e-mail e senha'); return; }
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      await R2A.login(email, senha);
      window.location.href = 'index.html';
    } catch (e) {
      showErr(e.message || 'Falha ao entrar');
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  }
  document.getElementById('btn-login').addEventListener('click', doLogin);
  ['email','senha'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
</script>
</body>
</html>
