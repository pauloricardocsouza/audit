<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R2 Audit · Dashboard geral</title>
<link rel="stylesheet" href="styles/theme.css?v=0.19">
<link rel="stylesheet" href="shared.css?v=0.19">
</head>
<body>

<div class="r2a-shell r2-app">

  <aside class="r2a-sidebar r2-side"></aside>

  <div class="r2a-main r2-main">
    <header class="r2a-topbar r2-top"></header>

    <div class="r2a-content r2-content">

      <!-- HERO -->
      <section class="r2-hero">
        <div class="r2-hero__left">
          <div class="r2-hero__kicker" id="hero-kicker">—</div>
          <h1 id="hero-title">Olá!</h1>
          <p id="hero-sub">Você tem 0 lançamentos aguardando conciliação.</p>
        </div>
        <div class="r2-hero__actions">
          <a href="conciliador/processamento.html" class="r2-btn r2-btn--hero-ghost">↥ Importar extrato</a>
          <a href="conciliador/conciliacao.html" class="r2-btn r2-btn--hero">Abrir conciliação →</a>
        </div>
      </section>

      <!-- KPIs -->
      <div class="r2-grid r2-grid-4" style="margin-bottom: 18px;">
        <div class="r2-kpi">
          <div class="r2-kpi__head">
            <span class="r2-kpi__label">Pendentes</span>
            <span class="r2-kpi__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></span>
          </div>
          <div class="r2-kpi__row">
            <span class="r2-kpi__value" id="kpi-pendentes">—</span>
            <span class="r2-kpi__delta r2-kpi__delta--down" id="kpi-pendentes-delta"></span>
          </div>
          <div class="r2-kpi__sub">aguardando ação</div>
        </div>

        <div class="r2-kpi">
          <div class="r2-kpi__head">
            <span class="r2-kpi__label">Contas ativas</span>
            <span class="r2-kpi__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><line x1="2" y1="11" x2="22" y2="11"/></svg></span>
          </div>
          <div class="r2-kpi__row">
            <span class="r2-kpi__value" id="kpi-contas">—</span>
          </div>
          <div class="r2-kpi__sub">contas bancárias</div>
        </div>

        <div class="r2-kpi">
          <div class="r2-kpi__head">
            <span class="r2-kpi__label">Taxa de conciliação</span>
            <span class="r2-kpi__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          </div>
          <div class="r2-kpi__row">
            <span class="r2-kpi__value" id="kpi-taxa">—</span>
            <span class="r2-kpi__delta r2-kpi__delta--up" id="kpi-taxa-delta"></span>
          </div>
          <div class="r2-kpi__sub">no mês corrente</div>
        </div>

        <div class="r2-kpi">
          <div class="r2-kpi__head">
            <span class="r2-kpi__label">Última atividade</span>
            <span class="r2-kpi__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg></span>
          </div>
          <div class="r2-kpi__row">
            <span class="r2-kpi__value" id="kpi-atividade" style="font-size: 22px;">—</span>
          </div>
          <div class="r2-kpi__sub" id="kpi-atividade-sub">há instantes</div>
        </div>
      </div>

      <!-- MÓDULOS -->
      <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;">
        <h2 style="font-size: 14px;">Módulos disponíveis</h2>
      </div>

      <div class="r2-grid r2-grid-3" id="modulos-grid"></div>

    </div>

    <footer class="r2a-footer r2-footer"></footer>
  </div>
</div>

<script src="config.js?v=0.19"></script>
<script src="shared.js?v=0.19"></script>
<script src="mock-data.js?v=0.19"></script>
<script src="data.js?v=0.19"></script>
<script>
  if (!R2A.requireAuth()) { /* já redirecionou */ }
  else {
    R2A.renderShell({ dashboardGeral: true });
    R2A.renderFooter();
    R2A.data.init();

    // Hero saudação por horário
    (function () {
      const u = R2A.session.user();
      const hr = new Date().getHours();
      const cumprimento = hr < 12 ? 'Bom dia' : hr < 18 ? 'Boa tarde' : 'Boa noite';
      const meses = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
      const dias  = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
      const d = new Date();
      document.getElementById('hero-kicker').textContent = `${dias[d.getDay()]}-FEIRA · ${String(d.getDate()).padStart(2,'0')} DE ${meses[d.getMonth()]}`;
      document.getElementById('hero-title').textContent = `${cumprimento}, ${u.nome.split(' ')[0]}`;
    })();

    // KPIs + Hero stat
    (async function () {
      const contas = await R2A.data.list(R2A_CONFIG.COLLECTIONS.CONTAS);
      const contasAtivas = contas.filter(c => c.ativo !== false);
      document.getElementById('kpi-contas').textContent = contasAtivas.length;

      const pendentes = (R2A_MOCK.BANCO || []).filter(b => b.status === 'pendente').length;
      document.getElementById('kpi-pendentes').textContent = pendentes;
      document.getElementById('kpi-pendentes-delta').textContent = '↓ 2';
      document.getElementById('hero-sub').textContent = `Você tem ${pendentes} lançamento${pendentes === 1 ? '' : 's'} aguardando conciliação. Bora dar uma olhada?`;

      const ultimo = R2A_MOCK.HISTORICO_MENSAL[R2A_MOCK.HISTORICO_MENSAL.length - 1];
      const taxa = ultimo ? Math.round(ultimo.conciliados_qtd / (ultimo.conciliados_qtd + ultimo.pendentes_qtd) * 100) : 0;
      document.getElementById('kpi-taxa').innerHTML = `${taxa}<span class="unit">%</span>`;
      document.getElementById('kpi-taxa-delta').textContent = '↑ 6pp';

      document.getElementById('kpi-atividade').textContent = 'agora';
      document.getElementById('kpi-atividade-sub').textContent = 'conciliação · há instantes';
    })();

    // Cards de módulos
    (function () {
      const grid = document.getElementById('modulos-grid');
      const icones = {
        conciliador: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a2 2 0 0 1 2-2h16"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a2 2 0 0 1-2 2H3"/></svg>',
        contratos: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg>'
      };
      const html = R2A_CONFIG.MODULOS.map(m => {
        const firstItem = m.itens[0];
        const href = m.ativo === false ? '#' : firstItem.href;
        const icon = icones[m.id] || icones.contratos;
        return `
          <a href="${href}" class="r2-card" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;${m.ativo === false ? 'opacity:0.6;pointer-events:none;' : ''}">
            <div style="padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
              <div style="width:42px;height:42px;background:var(--navy-soft);color:var(--navy);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;">
                ${icon}
              </div>
              <span class="r2-pill r2-pill--ok"><span class="dot"></span>ATIVO</span>
            </div>
            <div style="padding:0 20px 14px;flex:1;">
              <h3 style="font-size:15px;margin-bottom:6px;">${m.label}</h3>
              <p style="font-size:12.5px;color:var(--ink-3);line-height:1.5;">${m.desc}</p>
            </div>
            <div style="padding:12px 20px;border-top:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:11.5px;color:var(--ink-4);">${m.itens.length} telas</span>
              <span style="font-size:12.5px;color:var(--navy);font-weight:600;">Abrir módulo →</span>
            </div>
          </a>
        `;
      }).join('');

      // Card "em breve"
      const coming = `
        <div class="r2-card" style="display:flex;flex-direction:column;background:var(--navy-tint);border-style:dashed;">
          <div style="padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
            <div style="width:42px;height:42px;background:var(--line-2);color:var(--ink-4);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;">+</div>
            <span class="r2-pill r2-pill--mute"><span class="dot"></span>EM BREVE</span>
          </div>
          <div style="padding:0 20px 14px;flex:1;">
            <h3 style="font-size:15px;margin-bottom:6px;color:var(--ink-3);">Novos módulos</h3>
            <p style="font-size:12.5px;color:var(--ink-4);line-height:1.5;">Próximos módulos de auditoria serão adicionados aqui em breve.</p>
          </div>
          <div style="padding:12px 20px;border-top:1px solid var(--line-2);">
            <span style="font-size:11.5px;color:var(--ink-4);">em planejamento</span>
          </div>
        </div>
      `;

      grid.innerHTML = html + coming;
    })();
  }
</script>

</body>
</html>
