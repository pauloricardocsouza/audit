<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R2 Audit · Dashboard</title>
<link rel="stylesheet" href="shared.css?v=0.8">
<style>
  .dash-geral { padding: 24px; flex: 1; overflow-y: auto; }

  .dash-greet {
    margin-bottom: 24px;
  }
  .dash-greet h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .dash-greet p {
    font-size: 13px;
    color: var(--text-2);
  }

  .dash-section {
    margin-bottom: 28px;
  }
  .dash-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 12px;
  }

  .modulos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .modulo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }

  .modulo-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }

  .modulo-card.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  .modulo-card-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .modulo-card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .modulo-card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .modulo-card-desc {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.5;
  }

  .modulo-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .modulo-card-items {
    font-size: 11px;
    color: var(--muted);
  }

  .modulo-card-cta {
    font-size: 12px;
    color: var(--primary);
    font-weight: 600;
  }

  .modulo-card.coming {
    border-style: dashed;
    background: var(--surface-2);
  }

  .modulo-card.coming .modulo-card-icon {
    background: var(--neutral-bg);
    color: var(--muted);
  }

  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }

  .kpi-mini-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .kpi-mini-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .kpi-mini-value.success { color: var(--success); }
  .kpi-mini-value.warning { color: var(--warning); }

  .kpi-mini-sub {
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
  }

  @media (max-width: 640px) {
    .dash-geral { padding: 16px; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="r2a-shell">

  <aside class="r2a-sidebar"></aside>

  <div class="r2a-main">
    <header class="r2a-topbar"></header>

    <div class="r2a-content">
      <section class="dash-geral">

        <div class="dash-greet">
          <h1 id="greet-title">Olá!</h1>
          <p id="greet-sub">Bem-vindo ao R2 Audit. Selecione um módulo para começar.</p>
        </div>

        <!-- KPIs gerais do sistema (consolidação rápida) -->
        <div class="kpi-strip">
          <div class="kpi-mini">
            <div class="kpi-mini-label">Lançamentos pendentes</div>
            <div class="kpi-mini-value warning" id="kpi-pendentes">—</div>
            <div class="kpi-mini-sub">aguardando conciliação</div>
          </div>
          <div class="kpi-mini">
            <div class="kpi-mini-label">Contas cadastradas</div>
            <div class="kpi-mini-value" id="kpi-contas">—</div>
            <div class="kpi-mini-sub">contas bancárias ativas</div>
          </div>
          <div class="kpi-mini">
            <div class="kpi-mini-label">Taxa de conciliação</div>
            <div class="kpi-mini-value success" id="kpi-taxa">—</div>
            <div class="kpi-mini-sub">no mês corrente</div>
          </div>
          <div class="kpi-mini">
            <div class="kpi-mini-label">Última atividade</div>
            <div class="kpi-mini-value" id="kpi-atividade" style="font-size: 14px;">—</div>
            <div class="kpi-mini-sub" id="kpi-atividade-sub">há instantes</div>
          </div>
        </div>

        <!-- MÓDULOS -->
        <div class="dash-section">
          <div class="dash-section-title">Módulos disponíveis</div>
          <div class="modulos-grid" id="modulos-grid"></div>
        </div>

      </section>
    </div>

    <footer class="r2a-footer"></footer>
  </div>

</div>

<script src="config.js?v=0.8"></script>
<script src="shared.js?v=0.8"></script>
<script src="mock-data.js?v=0.8"></script>
<script src="data.js?v=0.8"></script>
<script>
  if (!R2A.requireAuth()) { /* já redirecionou */ }
  else {
    R2A.renderShell({ dashboardGeral: true });
    R2A.renderFooter();
    R2A.data.init();

    // Saudação personalizada
    (function () {
      const u = R2A.session.user();
      const hr = new Date().getHours();
      const cumprimento = hr < 12 ? 'Bom dia' : hr < 18 ? 'Boa tarde' : 'Boa noite';
      document.getElementById('greet-title').textContent = `${cumprimento}, ${u.nome.split(' ')[0]}!`;
    })();

    // Renderiza módulos
    (function () {
      const grid = document.getElementById('modulos-grid');
      const cards = R2A_CONFIG.MODULOS.map(m => {
        const firstItem = m.itens[0];
        const href = m.ativo === false ? '#' : firstItem.href;
        return `
          <a href="${href}" class="modulo-card ${m.ativo === false ? 'disabled' : ''}">
            <div class="modulo-card-head">
              <div class="modulo-card-icon">${m.icon}</div>
              <div>
                <div class="modulo-card-name">${m.label}</div>
              </div>
            </div>
            <div class="modulo-card-desc">${m.desc}</div>
            <div class="modulo-card-foot">
              <span class="modulo-card-items">${m.itens.length} telas</span>
              <span class="modulo-card-cta">Abrir →</span>
            </div>
          </a>
        `;
      }).join('');

      // Card "em breve"
      const comingCard = `
        <div class="modulo-card coming">
          <div class="modulo-card-head">
            <div class="modulo-card-icon">+</div>
            <div>
              <div class="modulo-card-name">Novos módulos</div>
            </div>
          </div>
          <div class="modulo-card-desc">Próximos módulos de auditoria serão adicionados aqui em breve.</div>
          <div class="modulo-card-foot">
            <span class="modulo-card-items">em planejamento</span>
            <span class="modulo-card-cta" style="color: var(--muted);">—</span>
          </div>
        </div>
      `;

      grid.innerHTML = cards + comingCard;
    })();

    // KPIs consolidados a partir do mock
    (async function () {
      const contas = await R2A.data.list(R2A_CONFIG.COLLECTIONS.CONTAS);
      const contasAtivas = contas.filter(c => c.ativo !== false);
      document.getElementById('kpi-contas').textContent = contasAtivas.length;

      const pendentes = R2A_MOCK.BANCO.filter(b => b.status === 'pendente').length;
      document.getElementById('kpi-pendentes').textContent = pendentes;

      // Taxa do mês corrente baseada no histórico mock
      const ultimo = R2A_MOCK.HISTORICO_MENSAL[R2A_MOCK.HISTORICO_MENSAL.length - 1];
      const taxa = ultimo ? Math.round(ultimo.conciliados_qtd / (ultimo.conciliados_qtd + ultimo.pendentes_qtd) * 100) : 0;
      document.getElementById('kpi-taxa').textContent = taxa + '%';

      document.getElementById('kpi-atividade').textContent = 'Conciliação';
      document.getElementById('kpi-atividade-sub').textContent = 'há instantes';
    })();
  }
</script>

</body>
</html>
